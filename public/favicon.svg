<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="1" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <!-- Main ring -->
  <circle cx="16" cy="16" r="11" fill="none" stroke="#7CFF3C" stroke-width="2" filter="url(#glow)"/>
  <!-- Mask for tab notch -->
  <rect x="14" y="3" width="4" height="3" fill="#000"/>
  <!-- Tab slit -->
  <rect x="15.25" y="3" width="1.5" height="4" rx="0.75" fill="#7CFF3C" filter="url(#glow)"/>
  <!-- Center LED dot -->
  <circle cx="16" cy="16" r="2" fill="#7CFF3C" filter="url(#glow)"/>
</svg>
